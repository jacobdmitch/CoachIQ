name = "coachiq-ai"
main = "worker.js"
compatibility_date = "2024-11-01"

# Non-secret config. Tune MAX_TOKENS down to lower per-call cost.
[vars]
ANTHROPIC_MODEL = "claude-haiku-4-5"
MAX_TOKENS = "700"
REQUIRE_ATTEST = "false"

# Secrets are NOT stored here. Set them once with wrangler:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put APP_CHECK_TOKEN     # shared secret the app sends as X-App-Check
