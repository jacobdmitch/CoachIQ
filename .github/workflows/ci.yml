# CI — runs on every push and PR. Guards against regressions before merge.
#
# Two jobs in parallel:
#   backend  — node --test runner, 106 tests
#   frontend — react-scripts test --watchAll=false, 55 tests
#
# Node 22 matches the engines field in package.json and Render's runtime.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:backend

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        # CI=true keeps react-scripts from opening a watch UI
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          CI: true
          # Build should tolerate warnings in CI; only hard errors fail the job.
          DISABLE_ESLINT_PLUGIN: 'false'
        run: npm run build
